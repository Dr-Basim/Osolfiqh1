        const FormativeAssessment = ({ topic, onComplete }) => {
            const [dropdownAnswers, setDropdownAnswers] = useState({});

            const [selectedLeft, setSelectedLeft] = useState(null);
            const [shakeError, setShakeError] = useState(false);
            const [shuffledListB, setShuffledListB] = useState([]);

            const { dropdownText, dropdownOptions, matching } = topic.assessment;

                if (matching) {

                }

                    if (index % 2 === 1) { 
                        const correctWord = part;
                        const options = dropdownOptions[correctWord] || [];
                        const isCorrect = dropdownAnswers[correctWord] === correctWord;
                        
                        return (
                            <select 
                                key={index}
                                value={dropdownAnswers[correctWord] || ""}
                                onChange={(e) => {
                                    setDropdownAnswers(prev => ({...prev, [correctWord]: e.target.value}));
                                }}

                            </select>
                        );
                    }
                    return <span key={index}>{part}</span>;
                });
            };

            const handleMatch = (rightItem) => {
                if (!selectedLeft) return;
                
                const isCorrect = matching.find(m => m.a === selectedLeft.a && m.b === rightItem.b);
                
                if (isCorrect) {
                    setMatchedPairs([...matchedPairs, {a: selectedLeft.a, b: rightItem.b}]);
                    setSelectedLeft(null);
                } else {
                    setShakeError(true);
                    setTimeout(() => setShakeError(false), 500);
                    setSelectedLeft(null);
                }
            };

            useEffect(() => {
                const dropdownsCorrect = Object.keys(dropdownOptions).every(key => dropdownAnswers[key] === key);
                const matchingCorrect = matchedPairs.length === matching.length;

                if (dropdownsCorrect && matchingCorrect) {
                    onComplete(true);
                } else {
                    onComplete(false);
                }

        const Assessment = ({ studentData, startTime, onComplete }) => {
            const [answers, setAnswers] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSelect = (qIndex, optIndex) => {
                setAnswers(prev => ({ ...prev, [qIndex]: optIndex }));
            };

            const handleSubmit = async () => {
                if (Object.keys(answers).length < mcqData.length) {
                    alert('الرجاء الإجابة على جميع الأسئلة.');
                    return;
                }

                setIsSubmitting(true);
                let finalScore = 0;
                mcqData.forEach((q, i) => {
                    if (answers[i] === q.correct) finalScore++;
                });

                const timeTakenMinutes = Math.round((Date.now() - startTime) / 60000);

                const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdBMIJTC8YhY1iy9uN-jcUvPBLm-0WvUZl2e_4RslU6hbKKrw/formResponse";
                const formData = new FormData();
                formData.append("entry.637964510", "الثالثة"); 
                formData.append("entry.385711661", studentData.name); 
                formData.append("entry.878838148", studentData.section); 
                formData.append("entry.1123339447", finalScore); 
                formData.append("entry.12254399", timeTakenMinutes); 

                try {
                    await fetch(formUrl, { method: "POST", mode: "no-cors", body: formData });
                } catch (e) {
                    console.log('Form sumitted silently.');
                }

                onComplete(finalScore);
            };

            return (
                <div className="max-w-4xl mx-auto py-8 px-4 fade-in">

                            <p className="text-green-600 font-bold text-xl bg-green-100 p-4 rounded-xl shadow-sm">ممتاز! أداء رائع يدل على استيعابك للمادة.</p>
                        ) : score >= 10 ? (
                            <p className="text-yellow-600 font-bold text-xl bg-yellow-100 p-4 rounded-xl shadow-sm">جيد، لكن ينصح بمراجعة المادة مرة أخرى.</p>
                        ) : (
                            <p className="text-red-600 font-bold text-xl bg-red-100 p-4 rounded-xl shadow-sm">يجب إعادة دراسة الوحدات بتركيز أعلى.</p>
                        )}
                        <p className="mt-6 text-sm text-gray-500 font-bold">تم إرسال النتيجة إلى أستاذ المادة بنجاح.</p>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen relative">
                    {/* الترويسة تظهر فيها زر التطبيقات لجميع أجزاء الدرس */}
                    <Header onOpenApps={() => setShowApplications(true)} />
                    
                    <main className="flex-grow">
                        {activeScreen === 'welcome' && renderWelcome()}
                        {activeScreen === 'topics' && renderTopicsFlow()}
                        {activeScreen === 'review' && <SmartReview onComplete={() => { setActiveScreen('assessment'); window.scrollTo(0,0); }} />}
                        {activeScreen === 'assessment' && <Assessment studentData={studentData} startTime={startTime} onComplete={(finalScore) => { setScore(finalScore); setActiveScreen('result'); window.scrollTo(0,0); }} />}
                        {activeScreen === 'result' && renderResult()}
                    </main>

                    {/* نافذة التطبيقات العملية المنبثقة فوق الدرس */}
                    {showApplications && (
                        <ApplicationsModal onClose={() => setShowApplications(false)} />
                    )}

                    <footer className="bg-navy text-white text-center py-4 mt-auto border-t-4 border-gold z-10 relative">
                        <p>تطبيق تفاعلي مصمم لمقرر أصول الفقه &copy; {new Date().getFullYear()}</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
